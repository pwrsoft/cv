name: Deploy Resume

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Tools and Theme
        run: |
          npm install resumed jsonresume-theme-even yamljs

      - name: Convert YAML to JSON
        run: |
          node -e "const fs = require('fs'); const yaml = require('yamljs'); const nativeObject = yaml.load('resume.yaml'); fs.writeFileSync('resume.json', JSON.stringify(nativeObject, null, 2));"
          # Debug: Check if JSON was actually created and has content
          cat resume.json

      - name: Build HTML Resume
        run: |
          npx resumed render resume.json -o index.html -t jsonresume-theme-even
          # Debug: Verify index.html size and content
          ls -lh index.html
          head -n 10 index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
