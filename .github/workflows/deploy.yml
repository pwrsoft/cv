name: Deploy Resume

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install YAMLResume
        run: |
          npm install -g yamlresume

      - name: Build HTML Resume
        run: |
          # --no-pdf skips the local LaTeX engine dependencies since we only need the HTML
          yamlresume build --no-pdf resume.yaml
          
          # Debug: check the output files to confirm resume.html exists
          ls -lh
          
          # Rename the output to index.html so GitHub Pages serves it as the root
          mv resume.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4