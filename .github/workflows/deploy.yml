name: Deploy Resume

on:
  push:
    branches:
      - main

permissions:
  contents: write # Crucial: Allows the action to commit to the gh-pages branch

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install YAMLResume
        run: |
          npm install -g yamlresume

      - name: Build HTML Resume
        run: |
          yamlresume build --no-pdf resume.yaml
          mv resume.html index.html

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          publish_branch: gh-pages
          keep_files: false